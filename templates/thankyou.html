<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You!</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #fdf9f2;
      color: #1a2c3a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .thankyou-container {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #1a2c3a;
    }

    p {
      font-size: 16px;
      margin-bottom: 12px;
      color: #333;
    }

    .emoji {
      font-size: 40px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="thankyou-container">
    <div class="emoji">🐶☕</div>
    <h2>Thanks for signing up!</h2>
    <p>You should receive a confirmation text momentarily.</p>
    <p>If not, just let a Yellow Dog team member know!</p>
  </div>
</body>
</html>
